name: Selenium Test Suite
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Để bạn có thể bấm nút chạy thủ công

jobs:
  run-tests:
    runs-on: ubuntu-latest # Máy ảo Linux của GitHub
    steps:
      - uses: actions/checkout@v4 # Lấy code về
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Chạy Selenium Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml
      - name: Lưu kết quả (Artifact)
        if: always() # Luôn lưu dù test Pass hay Fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/screenshots/
