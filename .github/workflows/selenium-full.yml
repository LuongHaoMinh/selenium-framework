name: Full Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - [cite_start]cron: '0 2 * * 1-5' # Tự động chạy vào 2 giờ sáng từ Thứ 2 đến Thứ 6 [cite: 421, 1086-1090]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        [cite_start]browser: [chrome, firefox] # Chạy song song 2 trình duyệt [cite: 427, 1094]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      
      - name: Chạy test
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -DsuiteXmlFile=testng-smoke.xml
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

  publish-report:
    [cite_start]needs: test # Chỉ chạy sau khi job 'test' xong [cite: 450, 1122]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download kết quả test
        uses: actions/download-artifact@v4
        [cite_start]with: { path: allure-results } # Tải kết quả từ cả Chrome và Firefox về [cite: 456-461, 1129-1134]

      - name: Tạo và Publish Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          [cite_start]gh_pages: gh-pages # Đẩy báo cáo vào nhánh gh-pages [cite: 466, 1139]
          allure_report: allure-report
